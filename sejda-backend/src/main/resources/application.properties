# Port — Render / Railway / Fly.io all set $PORT; locally we default to 8089.
server.port=${PORT:8089}

# File upload limits — sejda.com tops out around 200 MB per upload; we
# mirror that so the frontend's behaviour is predictable.
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=400MB

# Keep the response window long enough for OCR / compression on big PDFs.
spring.mvc.async.request-timeout=300000

# Quiet noisy startup banner; keep INFO for real work.
spring.main.banner-mode=off
logging.level.org.springframework=WARN
logging.level.org.sejda=INFO
