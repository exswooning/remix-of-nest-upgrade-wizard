name: 🚀 Deploy to Production (cPanel)

on:
  push:
    branches: [ cpanel ]
  pull_request:
    branches: [ cpanel ]

jobs:
  test:
    name: 🧪 Test & Build
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        
    - name: 📦 Install dependencies
      run: npm ci
      
    - name: 🔍 Run tests
      run: npm run lint --if-present
      
    - name: 🏗️ Build for production
      run: npm run build:cpanel
      
    - name: 📋 Verify cPanel configuration
      run: |
        echo "🔍 Checking cPanel configuration..."
        if [ -f "cpanel.yml" ]; then
          echo "✅ cPanel.yml found"
          echo "📋 Configuration preview:"
          head -20 cpanel.yml
        else
          echo "❌ cPanel.yml not found!"
          exit 1
        fi
      
    - name: ⬆️ Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: production-build
        path: |
          dist/
          dist/.htaccess
          cpanel.yml
          deploy-cpanel.sh
        retention-days: 7

  deploy:
    name: 🚀 Deploy to cPanel
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/cpanel'
    
    steps:
    - name: 📥 Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: production-build
        path: ./
        
    - name: 🔧 Make deployment script executable
      run: chmod +x deploy-cpanel.sh
      
    - name: 📧 Deploy to cPanel
      uses: SamKirkland/FTP-Deploy-Action@4.3.0
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: ${{ secrets.FTP_PORT || 21 }}
        local-dir: dist/
        server-dir: ${{ secrets.FTP_PATH || '/public_html' }}
        
    - name: 🔍 Verify deployment
      run: |
        echo "🔍 Verifying deployment files..."
        if [ -f "cpanel.yml" ]; then
          echo "✅ cPanel.yml ready"
        fi
        if [ -f "deploy-cpanel.sh" ]; then
          echo "✅ Deployment script ready"
        fi
        echo "📊 Build artifacts:"
        ls -la dist/ | head -10
        
    - name: ✅ Deployment Notification
      if: success()
      run: |
        echo "🎉 Deployment successful!"
        echo "🌐 Your UCAP & CGAP app is now live!"
        echo "📋 Deployment details:"
        echo "  - Target: ${{ secrets.FTP_PATH || '/public_html' }}"
        echo "  - Server: ${{ secrets.FTP_SERVER }}"
        echo "  - Configuration: cPanel.yml"
        echo "  - Build: Production optimized"
        
    - name: ❌ Deployment Failure
      if: failure()
      run: |
        echo "❌ Deployment failed!"
        echo "🔧 Check the following:"
        echo "  - FTP credentials in GitHub secrets"
        echo "  - Server connectivity"
        echo "  - File permissions"
        echo "  - Build artifacts"
