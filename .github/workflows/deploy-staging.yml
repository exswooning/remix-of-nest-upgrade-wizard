name: 🧪 Deploy to Staging

on:
  push:
    branches: [ develop, staging ]
  pull_request:
    branches: [ main, master ]
    types: [ opened, synchronize ]

jobs:
  test-staging:
    name: 🧪 Test Staging Build
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: 📦 Install dependencies
      run: npm ci
      
    - name: 🔍 Run linting
      run: npm run lint
      
    - name: 🏗️ Build for staging
      run: npm run build:staging
      
    - name: ⬆️ Upload staging artifacts
      uses: actions/upload-artifact@v4
      with:
        name: staging-build
        path: dist/
        retention-days: 3

  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: test-staging
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/staging'
    
    steps:
    - name: 📥 Download staging build
      uses: actions/download-artifact@v4
      with:
        name: staging-build
        path: dist/
        
    - name: 📧 Deploy to staging server
      uses: SamKirkland/FTP-Deploy-Action@4.3.0
      with:
        server: ${{ secrets.STAGING_FTP_SERVER }}
        username: ${{ secrets.STAGING_FTP_USERNAME }}
        password: ${{ secrets.STAGING_FTP_PASSWORD }}
        port: ${{ secrets.STAGING_FTP_PORT || 21 }}
        local-dir: dist/
        server-dir: ${{ secrets.STAGING_FTP_PATH || '/public_html/staging' }}
        timeout: 30000
        
    - name: 🔔 Staging notification
      if: success()
      run: |
        echo "🎉 Staging deployment successful!"
        echo "🌐 Staging URL: ${{ secrets.STAGING_URL }}"
        
    - name: ❌ Staging failure
      if: failure()
      run: |
        echo "❌ Staging deployment failed!"
        echo "🔧 Check deployment logs for details"
